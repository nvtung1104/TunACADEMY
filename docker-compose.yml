services:
    laravel:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: tunacademy_laravel
        restart: unless-stopped
        working_dir: /var/www/html
        env_file:
            - .env
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: tunacademy
            DB_USERNAME: tunacademy
            DB_PASSWORD: tunacademy
            REDIS_HOST: redis
            REDIS_CLIENT: predis
            SESSION_DRIVER: redis
            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
        volumes:
            - .:/var/www/html
        networks:
            - tunacademy
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_healthy

    nginx:
        image: nginx:alpine
        container_name: tunacademy_nginx
        restart: unless-stopped
        ports:
            - "8081:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
        networks:
            - tunacademy
        depends_on:
            - laravel

    mysql:
        image: mysql:8.0
        container_name: tunacademy_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: tunacademy
            MYSQL_USER: tunacademy
            MYSQL_PASSWORD: tunacademy
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
        networks:
            - tunacademy
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-uroot",
                    "-proot",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        container_name: tunacademy_redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
            - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
        command: redis-server /usr/local/etc/redis/redis.conf
        networks:
            - tunacademy
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    phpmyadmin:
        image: phpmyadmin/phpmyadmin:latest
        container_name: tunacademy_phpmyadmin
        restart: unless-stopped
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "8082:80"
        networks:
            - tunacademy
        depends_on:
            - mysql

    reverb:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: tunacademy_reverb
        restart: unless-stopped
        working_dir: /var/www/html
        env_file:
            - .env
        environment:
            DB_CONNECTION: mysql
            DB_HOST: mysql
            DB_PORT: 3306
            DB_DATABASE: tunacademy
            DB_USERNAME: tunacademy
            DB_PASSWORD: tunacademy
            REDIS_HOST: redis
            REDIS_CLIENT: predis
            SESSION_DRIVER: redis
            CACHE_STORE: redis
            QUEUE_CONNECTION: redis
        volumes:
            - .:/var/www/html
        command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
        ports:
            - "8080:8080"
        networks:
            - tunacademy
        depends_on:
            - laravel
            - redis

networks:
    tunacademy:
        driver: bridge

volumes:
    mysql_data:
    redis_data:
