services:
  laravel:
    image: YOUR_DOCKERHUB_USERNAME/tunacademy:latest
    container_name: tunacademy_laravel
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage_data:/var/www/html/storage/app/public
    networks:
      - tunacademy
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: tunacademy_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - storage_data:/var/www/html/storage/app/public:ro
    networks:
      - tunacademy
    depends_on:
      - laravel

  mysql:
    image: mysql:8.0
    container_name: tunacademy_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    networks:
      - tunacademy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tunacademy_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - tunacademy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  reverb:
    image: YOUR_DOCKERHUB_USERNAME/tunacademy:latest
    container_name: tunacademy_reverb
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    ports:
      - "8080:8080"
    networks:
      - tunacademy
    depends_on:
      - laravel
      - redis

networks:
  tunacademy:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  storage_data:
