# Listening
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0

# Relay ports for WebRTC media
min-port=49152
max-port=49200

# Authentication
lt-cred-mech
realm=tunacademy.local
server-name=tunacademy

# Credentials — change these in production
user=tunacademy:secret

# Security
fingerprint
no-multicast-peers

# Logging
log-file=/var/log/turnserver/turnserver.log
no-stdout-log
verbose
